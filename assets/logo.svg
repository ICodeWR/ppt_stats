<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>
  <!-- PPT 文档图标 -->
  <rect x="52" y="40" width="152" height="176" rx="12" ry="12" fill="white" opacity="0.95"/>
  <!-- 顶部标题栏 -->
  <rect x="52" y="40" width="152" height="40" rx="12" ry="12" fill="#FF6B6B"/>
  <rect x="52" y="68" width="152" height="12" fill="#FF6B6B"/>
  <!-- 内容行 -->
  <rect x="72" y="98" width="112" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="72" y="118" width="88" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="72" y="138" width="100" height="8" rx="4" fill="#E0E0E0"/>
  <!-- 图表区域 -->
  <rect x="72" y="162" width="48" height="36" rx="4" fill="#667eea" opacity="0.3"/>
  <rect x="128" y="162" width="56" height="36" rx="4" fill="#764ba2" opacity="0.3"/>
  <!-- 柱状图 -->
  <rect x="80" y="185" width="8" height="13" rx="2" fill="#667eea"/>
  <rect x="92" y="178" width="8" height="20" rx="2" fill="#667eea"/>
  <rect x="104" y="172" width="8" height="26" rx="2" fill="#667eea"/>
  <!-- 折线示意 -->
  <polyline points="136,195 148,180 160,188 172,170" fill="none" stroke="#764ba2" stroke-width="3" stroke-linecap="round"/>
  <!-- 统计数字图标 -->
  <circle cx="62" cy="54" r="14" fill="white" opacity="0.9"/>
  <text x="62" y="58" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FF6B6B" text-anchor="middle">#</text>
</svg>